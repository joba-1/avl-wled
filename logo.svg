<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <title>avl-wled</title>
  <desc>Trash bin in front of an LED strip showing one urgent (red) and three colored segments.</desc>
  <rect width="128" height="128" fill="#101418"/>
  <!-- LED strip background -->
  <rect x="8" y="22" width="112" height="14" rx="3" fill="#1c2026" stroke="#2a2f37" stroke-width="1"/>
  <!-- 5 LED segments: red (urgent), brown (bio), blue (paper), yellow (gelb), dim (off) -->
  <g>
    <rect x="12" y="25" width="20" height="8" rx="1.5" fill="#ff2a2a">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="34" y="25" width="20" height="8" rx="1.5" fill="#7a4a1a"/>
    <rect x="56" y="25" width="20" height="8" rx="1.5" fill="#1f6cff"/>
    <rect x="78" y="25" width="20" height="8" rx="1.5" fill="#ffcc00"/>
    <rect x="100" y="25" width="16" height="8" rx="1.5" fill="#22262d"/>
  </g>
  <!-- Glow under the lit segments -->
  <g opacity="0.35" filter="url(#blur)">
    <rect x="12" y="33" width="86" height="8" fill="#ffffff"/>
  </g>
  <defs>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <!-- Trash bin -->
  <g transform="translate(40,52)">
    <!-- lid -->
    <rect x="-2" y="0" width="52" height="8" rx="2" fill="#cfd6df"/>
    <rect x="18" y="-5" width="12" height="6" rx="1.5" fill="#cfd6df"/>
    <!-- body -->
    <path d="M2 10 L46 10 L42 60 L6 60 Z" fill="#9ba3ad" stroke="#5d6470" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- ribs -->
    <line x1="14" y1="14" x2="13" y2="56" stroke="#5d6470" stroke-width="1.2"/>
    <line x1="24" y1="14" x2="24" y2="56" stroke="#5d6470" stroke-width="1.2"/>
    <line x1="34" y1="14" x2="35" y2="56" stroke="#5d6470" stroke-width="1.2"/>
  </g>
  <!-- label -->
  <text x="64" y="120" text-anchor="middle"
        font-family="Inter, Helvetica, Arial, sans-serif"
        font-size="10" font-weight="600" fill="#cfd6df"
        letter-spacing="2">AVL · WLED</text>
</svg>
