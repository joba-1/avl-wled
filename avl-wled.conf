# avl-wled configuration
# Lines starting with # are comments. Any key may be overridden on the
# command line with --key=value.

# Public iCal URL of the AVL collection calendar
ical_url  = https://example.invalid/avl.ics

# WLED host (host[:port], no http://)
wled_host = wled1

# Where to keep persistent state and the cached iCal file
state_file = /var/lib/avl-wled/acked
ical_cache = /var/lib/avl-wled/calendar.ics

# Schedule (seconds)
fetch_interval = 604800   # weekly
check_interval = 3600     # hourly

# Warning windows (seconds before the event)
urgent_window = 10800     # 3 hours  -> status segment red (daytime only)
warn_window   = 86400     # 24 hours -> shown during the day

# Night time (local hour-of-day, 24h). Wraps midnight if start > end.
# During night the device is fully off (even urgent events are hidden).
night_start = 22
night_end   = 7

# Acknowledge HTTP endpoint (GET/POST http://host:port/ack)
http_port = 8765

# LED strip
led_count       = 60
wled_brightness = 128
max_segments    = 8

# Indicator colors (hex RRGGBB, no leading #)
urgent_color = FF0022     # any urgent event present -> status segment red
normal_color = FFEEFF     # otherwise -> status segment green

# Map iCal SUMMARY keywords (case-insensitive substring) to colors.
# Add or remove as needed for your AVL feed.
color_restmuell  = 3A1070   # residual waste (dark blue-purple)
color_restmüll   = 3A1070
color_bio        = 663300   # bio waste
color_papier     = 00A000   # paper (green)
color_gelb       = FFCC00   # yellow bag / recycling
color_wertstoff  = FFCC00
color_sperr      = 800080   # bulky waste
color_glas       = 0040FF   # glass (blue)
color_schadstoff = FF8800   # hazardous-waste mobile ("Schadstoffmobil")
